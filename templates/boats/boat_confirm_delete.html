{% extends "base.html" %}

{% block title %}Delete Listing - SeaGo{% endblock %}

{% block content %}
<div class="container mt-5" style="max-width: 500px;">
  <div class="border rounded-4 p-4 shadow-sm text-center">
    <i class="bi bi-exclamation-triangle text-danger fs-1"></i>
    <h4 class="fw-bold mt-3">Delete listing</h4>
    <p class="text-muted">Are you sure you want to delete <strong>{{ boat.name }}</strong>? This cannot be undone.</p>
    <form method="POST">
      {% csrf_token %}
      <div class="d-flex gap-2 justify-content-center mt-3">
        <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, delete</button>
        <a href="{% url 'boats:my_listings' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
