<div class="col-md-4">
  <div class="border rounded-4 overflow-hidden">
    <div style="height: {{ image_height|default:'160px' }};{% if image_overflow %} overflow: {{ image_overflow }};{% endif %}">
      {% if boat.get_cover_image %}
        <img src="{{ boat.get_cover_image }}" class="w-100 h-100 object-fit-cover" alt="{{ boat.name }}">
      {% else %}
        <div class="w-100 h-100 bg-secondary d-flex align-items-center justify-content-center">
          <i class="bi bi-image text-white fs-1"></i>
        </div>
      {% endif %}
    </div>
    <div class="p-3">
        <div class="d-flex justify-content-between align-items-start">
          <div>
          <div class="fw-bold text-break-safe">{{ boat.name }}</div>
          <div class="text-muted text-break-safe" style="font-size: 13px;">{{ boat.location }}</div>
          <div class="{% if compact_price %}mt-1 {% endif %}" style="font-size: 13px;">€{{ boat.price_per_day }}/day</div>
          </div>
        <div>
          {% if boat.is_approved %}
            <span class="badge bg-success">Live</span>
          {% else %}
            <span class="badge bg-warning text-dark">Pending</span>
          {% endif %}
        </div>
      </div>
      <div class="d-flex gap-2 mt-3">
        <a href="{% url 'boats:boat_edit' boat.pk %}" class="btn btn-outline-secondary btn-sm rounded-pill">Edit</a>
        <a href="{% url 'boats:boat_delete' boat.pk %}" class="btn btn-outline-danger btn-sm rounded-pill">Delete</a>
      </div>
    </div>
  </div>
</div>
