<div class="text-center {{ spacing|default:'py-4' }}{% if extra_classes %} {{ extra_classes }}{% endif %} border rounded-4">
  <i class="bi {{ icon }} fs-1 text-muted"></i>
  <h5 class="mt-3 text-muted">{{ title }}</h5>
  {% if text %}
    <p class="text-muted">{{ text }}</p>
  {% endif %}
  {% if button_url and button_label %}
    <a href="{{ button_url }}" class="btn rounded-pill text-white px-4 mt-2" style="background: #bb2d3c;">{{ button_label }}</a>
  {% endif %}
</div>
