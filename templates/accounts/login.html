<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
</head>
<body>
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-4" style="border-radius: 16px;">

        <h3 class="fw-bold mb-1">Welcome back</h3>
        <p class="text-muted mb-4" style="font-size: 14px;">Log in to your SeaGo account</p>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger rounded-pill">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2">Log in</button>
        </form>

        <p class="text-center mt-3" style="font-size: 14px;">
          Don't have an account? <a href="{% url 'accounts:register' %}">Sign up</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}


</body>
</html>
