{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-4" style="border-radius: 16px;">
        
        <h3 class="fw-bold mb-1">Create your account</h3>
        <p class="text-muted mb-4" style="font-size: 14px;">Join SeaGo and start exploring boats</p>

        <form method="POST">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2">Sign up</button>
        </form>

        <p class="text-center mt-3" style="font-size: 14px;">
          Already have an account? <a href="{% url 'accounts:login' %}">Log in</a>
        </p>

      </div>
    </div>
  </div>
</div>
{% endblock %}
